<html lang="ko">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>회원가입 Form</title></head>
<body>
  <h1>회원가입</h1>

    <p><label for="name">이름</label> <input id="name" type="text" required></p>

    <button type="submit">가입</button>
  </form>
</body>
</html>
